<!--
    Version: Damso Express V4 (Refactor)
    Project Name: CHUU ORDER FORM
    Last Modified: 2026-01-01
-->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>CHUU Order</title>

    <link rel="icon" href="https://www.chuu.kr/images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- [Tier 1] Damso Core -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/core/core.css">
    <script src="https://dev.dam.so/_inc/ex/v4/core/core.js"></script>

    <!-- [Tier 2] Damso View: Form -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/view/form.css">
    <script src="https://dev.dam.so/_inc/ex/v4/view/form.js"></script>

    <!-- [Tier 3] User Custom -->
    <link rel="stylesheet" href="./lay.css">
    <script src="./lay.js" defer></script>
</head>

<body>
    <div class="damso-app">
        <div class="damso-container">
            <header class="damso-header">
                <h1 class="damso-header__title" data-i18n="home_title"></h1>
                <p class="damso-header__description" data-i18n="home_description"></p>

            <div class="damso-nav__buttons">
                <nav id="lang-switcher" class="damso-lang-switcher">
                    <a href="?lang=ko" class="damso-lang-btn">KO</a>
                    <a href="?lang=en" class="damso-lang-btn">EN</a>
                </nav>
            </div>
            </header>

            <form id="order-form" class="damso-form" novalidate>
                <input type="hidden" name="form" value="chuu">

                <!-- 1. Customer Info -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="customer_info_title"></h2>
                        <span class="damso-card__badge">Profile</span>
                    </div>

                    <div class="profile-list">

                        <div class="damso-grid damso-grid--cols-3" style="gap: 12px;">
                            <div class="damso-group">
                                <label for="name" class="damso-label" data-i18n="form_label_name">Name</label>
                                <input type="text" id="name" name="name" required class="damso-input" placeholder="Name">
                            </div>
                            <div class="damso-group">
                                <label for="phone" class="damso-label" data-i18n="form_label_phone">Phone</label>
                                <input type="tel" id="phone" name="phone" required class="damso-input"
                                    placeholder="010-0000-0000">
                            </div>
                            <div class="damso-group">
                                <label for="email" class="damso-label" data-i18n="form_label_email">Email</label>
                                <input type="email" id="email" name="email" required class="damso-input"
                                    placeholder="example@email.com">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Cake Order (Unified) -->
                <div class="damso-card" id="card-cake">
                    <div class="damso-card__header">
                        <h2 data-i18n="cake_order_title"></h2>
                        <span class="damso-card__badge">Custom</span>
                    </div>

                    <div class="cake-list">
                        <!-- Type & Size -->
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cake_type"></label>
                            <select name="cake_type" id="cake_type" class="damso-select" required>
                                <option value="" data-i18n="cake_type_none" data-price="0"></option>
                                <option value="lettering" data-i18n="cakes_lettering_title" data-price="55"></option>
                                <option value="photo" data-i18n="cakes_photo_title" data-price="65"></option>
                                <option value="3d" data-i18n="cakes_3d_title" data-price="85"></option>
                            </select>
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cake_size_label"></label>
                            <select name="cake_size" class="damso-select" required>
                                <option value="lunchbox" data-i18n="opt_size_lunchbox" data-price="0"></option>
                                <option value="size_1" data-i18n="opt_size_1" data-price="15"></option>
                                <option value="size_2" data-i18n="opt_size_2" data-price="25"></option>
                            </select>
                        </div>

                        <!-- Flavor & Cream -->
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cake_flavor_label"></label>
                            <select name="cake_flavor" class="damso-select">
                                <option value="vanilla" data-i18n="opt_flavor_vanilla" data-price="0"></option>
                                <option value="choco" data-i18n="opt_flavor_choco" data-price="3"></option>
                                <option value="carrot" data-i18n="opt_flavor_carrot" data-price="4"></option>
                                <option value="redvelvet" data-i18n="opt_flavor_redvelvet" data-price="5"></option>
                            </select>
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cake_cream_label"></label>
                            <select name="cake_cream" class="damso-select">
                                <option value="fresh" data-i18n="opt_cream_fresh" data-price="0"></option>
                                <option value="cheese" data-i18n="opt_cream_cheese" data-price="4"></option>
                            </select>
                        </div>

                        <!-- Design Details -->
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cake_details_label"></label>
                            <textarea name="cake_details" class="damso-textarea" rows="3"
                                data-i18n-placeholder="cake_details_placeholder"></textarea>
                        </div>

                        <!-- Reference File (Condition: Hidden for Lettering) -->
                        <div class="damso-group hidden" id="group-file">
                            <label class="damso-label" data-i18n="photo_upload"></label>
                            <div class="damso-file-wrapper">
                                <input type="file" name="attachments[]" class="damso-file-input" multiple accept="image/*">
                                <div class="damso-file-label" data-i18n="form_file_default_label"></div>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- 3. Cookie Order (Quantity Input) -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="cookie_order_title"></h2>
                        <span class="damso-card__badge">Add-on</span>
                    </div>

                    <div class="cookie-list">
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_01_title"></label>
                            <input type="number" name="cookie_01_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="3.5">
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_02_title"></label>
                            <input type="number" name="cookie_02_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="3.5">
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_03_title"></label>
                            <input type="number" name="cookie_03_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="4.0">
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_04_title"></label>
                            <input type="number" name="cookie_04_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="4.0">
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_05_title"></label>
                            <input type="number" name="cookie_05_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="4.5">
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="cookies_06_title"></label>
                            <input type="number" name="cookie_06_qty" class="damso-input" min="0" placeholder="0"
                                data-unit-price="4.5">
                        </div>
                        <!-- Added Description per Tier 3 Request -->
                        <p class="damso-note" style="grid-column: 1 / -1; margin-top: 10px;">원하시는 수량을 입력해주세요. (개당)</p>
                    </div>
                </div>

                <!-- 4. Pickup & Delivery -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="pickup_delivery_title"></h2>
                        <span class="damso-card__badge">Delivery</span>
                    </div>

                    <div class="pickup-list">
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="pickup_method"></label>
                            <select name="pickup_method" id="pickup_method" class="damso-select">
                                <option value="pickup" data-i18n="store_pickup"></option>
                                <option value="delivery" data-i18n="delivery"></option>
                            </select>
                        </div>
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="desired_date"></label>
                            <input type="date" name="pickup_date" class="damso-input" required>
                        </div>
                        <div class="damso-group hidden" id="group-address">
                            <label class="damso-label" data-i18n="delivery_address"></label>
                            <input type="text" name="address" class="damso-input"
                                data-i18n-placeholder="delivery_address_ph">
                            <p class="damso-note delivery_note" data-i18n="delivery_note"></p>
                        </div>
                    </div>
                </div>
                <!-- 5. Additional Message -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="additional_requests_title"></h2>
                        <span class="damso-card__badge">Requests</span>
                    </div>
                    <div class="damso-group">
                        <textarea class="damso-textarea" name="message" rows="3"></textarea>
                    </div>
                </div>

                <!-- Sticky Price Display -->
                <div class="price-sticky-bar">
                    <div class="price-content">
                        <span class="price-label" data-i18n="label_estimated_total">Total</span>
                        <span class="price-value" id="total-price">$0</span>
                    </div>
                    <p class="price-note" data-i18n="price_note"></p>
                </div>

                <!-- Submit -->
                <div class="damso-submit-area">
                    <div class="damso-check-group">
                        <input type="checkbox" name="agree" id="agree" class="damso-check-input" required>
                        <label for="agree" class="damso-check-label" data-i18n="label_agree"></label>
                    </div>
                    <button type="submit" class="damso-btn damso-btn--submit damso-btn--full">
                        <span data-i18n="btn_submit"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
